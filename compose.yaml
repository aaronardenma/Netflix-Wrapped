services:
  backend:
    build:
      context: ./backend
    container_name: netflix_wrapped_backend
    env_file:
      - ./backend/.env
    environment:
      POSTGRESQL_HOST: host.docker.internal
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    command: >
      sh -c "python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8000 --noreload"

  frontend:
    build:
      context: ./frontend
    container_name: netflix_wrapped_frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
